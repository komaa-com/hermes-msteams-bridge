name: pypi-publish

# Publishes hermes-msteams-bridge to PyPI via Trusted Publishing (OIDC, no token).
# Requires the pending/trusted publisher on PyPI to reference THIS workflow file
# name and the "pypi" environment. Trigger: version tag push or manual dispatch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --quiet build
          python -m build
      - name: Sanity-check the wheel contents
        run: |
          python -m pip install --quiet check-wheel-contents || true
          python - <<'PY'
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          assert any(n.startswith("hermes_teams_voice/") for n in names), "hermes_teams_voice/ missing from wheel"
          assert any(n.endswith("plugin.yaml") for n in names), "plugin.yaml missing from wheel"
          print("wheel OK:", whl, f"({len(names)} files)")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
